name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        id: prettier-check
        run: npm run format:check
        continue-on-error: true

      - name: Fix formatting
        if: steps.prettier-check.outcome == 'failure'
        run: npm run format

      - name: Verify formatting after fix
        run: npm run format:check

      - name: Check linting (ESLint)
        id: eslint-check
        run: npm run lint:check
        continue-on-error: true

      - name: Fix linting
        if: steps.eslint-check.outcome == 'failure'
        run: |
          echo "🚨 Linting issues found. Attempting to fix..."
          npm run lint

      - name: Verify linting after fix
        run: npm run lint:check

      - name: Build application
        run: npm run build

      - name: Run unit tests
        run: npm run test -- --runInBand

