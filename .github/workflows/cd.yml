name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches:
      - main
    types:
      - completed

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Run only if CI passed OR manual trigger
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      # 1. Checkout code (gets your Dockerfile + project)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build Docker image (FROM YOUR Dockerfile)
      - name: Build Docker Image
        run: |
          echo "🚀 Building Docker image..."
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY }}:latest .

      # 4. Push image to Docker Hub
      - name: Push Docker Image
        run: |
          echo "📦 Pushing Docker image..."
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY }}:latest

      # 5. Trigger Render deployment
      - name: Deploy to Render
        run: |
          echo "🚀 Triggering Render deployment..."
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      # 6. Notify on Success/Failure
      - name: Notify on Success
        if: success()
        run: echo "✅ Deployment successful! Your app is being updated on Render."

      - name: Notify on Failure
        if: failure()
        run: echo "Deployment failed. Check workflow logs."